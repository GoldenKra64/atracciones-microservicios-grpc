syntax = "proto3";

option csharp_namespace = "Atraccion.Microservicios.Factura.Api.Protos";

package factura;

service FacturaService {
  rpc GenerateInvoice (GenerateInvoiceRequest) returns (GenerateInvoiceResponse);
}

message GenerateInvoiceRequest {
  int32 revId = 1;
  int32 cliId = 2;
  double total = 3;
  string canal = 4;
  optional string nombreReceptor = 5;
  optional string correoReceptor = 6;
}

message GenerateInvoiceResponse {
  bool success = 1;
  int32 facId = 2;
  string facGuid = 3;
  string facNumero = 4;
  double total = 5;
  string fechaEmision = 6;
  string estado = 7;
  string nombreReceptor = 8;
  string correoReceptor = 9;
}
