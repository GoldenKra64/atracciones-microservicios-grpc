<div class="admin-container">
  <div class="admin-header">
    <div class="header-content">
      <a routerLink="/admin/reserva" style="color: #fff;" class="back-link">← Volver a Reservas</a>
      <h1 style="color: #fff;">{{ isEditing ? 'Editar Reserva' : 'Nueva Reserva' }}</h1>
    </div>
  </div>

  <div class="admin-card">
    <form [formGroup]="form" (ngSubmit)="guardar()">
      <div class="form-grid grid-2">

        <!-- ── Cliente ──────────────────────────────────────────────────── -->
        <div class="form-group full-width">
          <label>Cliente</label>
          <select formControlName="clienteId">
            <option value="">Seleccione un cliente</option>
            <option *ngFor="let c of clientes" [value]="c.id">
              {{ c.nombres }} {{ c.apellidos }} ({{ c.numeroIdentificacion }})
            </option>
          </select>
        </div>

        <!-- ── Atracción ────────────────────────────────────────────────── -->
        <div class="form-group full-width">
          <label>Atracción</label>
          <select formControlName="at_guid"
                  (change)="onAtraccionChange($any($event.target).value)">
            <option value="">Seleccione una atracción</option>
            <option *ngFor="let a of atracciones" [value]="a.guid">{{ a.name }}</option>
          </select>
        </div>

        <!-- ── Horario (se habilita al seleccionar atracción) ──────────── -->
        <div class="form-group">
          <label>
            Horario
            <span *ngIf="loadingHorarios" class="loading-hint">cargando...</span>
          </label>
          <select formControlName="hor_guid"
                  [attr.disabled]="(!form.get('at_guid')?.value || loadingHorarios) ? true : null"
                  (change)="onHorarioChange($any($event.target).value)">
            <option value="">
              {{ !form.get('at_guid')?.value ? 'Primero seleccione una atracción' : 'Seleccione un horario' }}
            </option>
            <option *ngFor="let h of horarios" [value]="h.hor_guid">
              {{ h.fecha }} {{ h.hora_inicio }} - {{ h.hora_fin || 'N/A' }}
              ({{ h.cupos }} cupos)
            </option>
          </select>
        </div>

        <!-- ── Origen Canal ─────────────────────────────────────────────── -->
        <div class="form-group">
          <label>Origen Canal</label>
          <input type="text" formControlName="origen_canal" placeholder="Ej. Web, Teléfono, etc." />
        </div>

      </div>

      <!-- ── Líneas de Tickets (se habilitan al seleccionar horario) ─────── -->
      <div class="lineas-container" formArrayName="lineas">
        <h3>
          Líneas de Reserva (Tickets)
          <span *ngIf="loadingTickets" class="loading-hint">cargando...</span>
        </h3>

        <div *ngIf="!form.get('hor_guid')?.value && !isEditing" class="info-hint">
          Seleccione una atracción y un horario para ver los tickets disponibles.
        </div>

        <div class="linea-item"
             *ngFor="let linea of lineas.controls; let i = index"
             [formGroupName]="i">

          <div class="form-group" style="flex: 2;">
            <label>Ticket</label>
            <select formControlName="tck_guid">
              <option value="">Seleccione un ticket</option>
              <!-- Tickets del horario seleccionado -->
              <ng-container *ngIf="tickets.length > 0; else ticketsDeEdicion">
                <option *ngFor="let t of tickets" [value]="t.tck_guid">
                  {{ t.tipo }} — {{ t.precio | currency:'USD' }}
                </option>
              </ng-container>
              <!-- En edición, si no hay tickets cargados aún mostramos el actual como opción -->
              <ng-template #ticketsDeEdicion>
                <option *ngIf="linea.get('tck_guid')?.value as tckVal" [value]="tckVal">
                  {{ tckVal }} (seleccionado)
                </option>
              </ng-template>
            </select>
          </div>

          <div class="form-group" style="flex: 1;">
            <label>Cantidad</label>
            <input type="number" min="1" formControlName="cantidad" />
          </div>

          <button type="button" class="btn-icon" (click)="removerLinea(i)"
                  *ngIf="lineas.length > 1" title="Eliminar línea">
            <i class="fas fa-trash">🗑️</i>
          </button>
        </div>

        <button type="button" class="btn-secondary" style="margin-top: 1rem;"
                (click)="agregarLinea()"
                [disabled]="!form.get('hor_guid')?.value && tickets.length === 0">
          <i class="fas fa-plus"></i> Añadir Ticket
        </button>
      </div>

      <!-- ── Acciones ─────────────────────────────────────────────────────── -->
      <div class="form-actions">
        <button type="button" class="btn-danger" style="margin-right: auto;"
                *ngIf="isEditing && estadoReserva === 'PEN'"
                (click)="anularReserva()">
          Anular Reserva
        </button>
        <button type="button" class="btn-secondary" routerLink="/admin/reserva">Volver</button>
        <button type="submit" class="btn-primary"
                [disabled]="form.invalid || saving || estadoReserva !== 'PEN'"
                *ngIf="estadoReserva === 'PEN'">
          <span *ngIf="!saving">{{ isEditing ? 'Actualizar' : 'Crear' }}</span>
          <span *ngIf="saving">Guardando...</span>
        </button>
      </div>
    </form>
  </div>
</div>

<div class="toast" [ngClass]="toast.type" *ngIf="toast.visible">
  {{ toast.message }}
</div>
