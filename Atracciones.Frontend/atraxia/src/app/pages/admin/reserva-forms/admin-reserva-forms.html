<div class="admin-container">
  <div class="admin-header">
    <div class="header-content">
      <a routerLink="/admin/reserva" style="color: #fff;" class="back-link">← Volver a Reservas</a>
      <h1 style="color: #fff;">{{ isEditing ? 'Editar Reserva' : 'Nueva Reserva' }}</h1>
    </div>
  </div>

  <div class="admin-card">
    <form [formGroup]="form" (ngSubmit)="guardar()">
      <div class="form-grid grid-2">
        <div class="form-group full-width">
          <label>Cliente</label>
          <select formControlName="clienteId">
            <option value="">Seleccione un cliente</option>
            <option *ngFor="let c of clientes" [value]="c.id">{{ c.nombres }} {{ c.apellidos }} ({{ c.numeroIdentificacion }})</option>
          </select>
        </div>

        <div class="form-group">
          <label>Horario</label>
          <select formControlName="hor_guid">
            <option value="">Seleccione un horario</option>
            <option *ngFor="let h of horarios" [value]="h.hor_guid">{{ h.fecha }} {{ h.hora_inicio }} - {{ h.hora_fin || 'N/A' }} (ID: {{ h.horarioId }})</option>
          </select>
        </div>

        <div class="form-group">
          <label>Origen Canal</label>
          <input type="text" formControlName="origen_canal" placeholder="Ej. Web, Teléfono, etc." />
        </div>
      </div>

      <div class="lineas-container" formArrayName="lineas">
        <h3>Líneas de Reserva (Tickets)</h3>
        
        <div class="linea-item" *ngFor="let linea of lineas.controls; let i = index" [formGroupName]="i">
          <div class="form-group" style="flex: 2;">
            <label>Ticket</label>
            <select formControlName="tck_guid">
              <option value="">Seleccione un ticket</option>
              <option *ngFor="let t of tickets" [value]="t.guid">{{ t.nombre }} - {{ t.tipo }} - {{ t.precio | currency:'USD' }}</option>
            </select>
          </div>
          
          <div class="form-group" style="flex: 1;">
            <label>Cantidad</label>
            <input type="number" min="1" formControlName="cantidad" />
          </div>
          
          <button type="button" class="btn-icon" (click)="removerLinea(i)" *ngIf="lineas.length > 1" title="Eliminar línea">
            <i class="fas fa-trash">🗑️</i>
          </button>
        </div>

        <button type="button" class="btn-secondary" style="margin-top: 1rem;" (click)="agregarLinea()">
          <i class="fas fa-plus"></i> Añadir Ticket
        </button>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-danger" style="margin-right: auto;" *ngIf="isEditing && estadoReserva === 'PEN'" (click)="anularReserva()">Anular Reserva</button>
        <button type="button" class="btn-secondary" routerLink="/admin/reserva">Volver</button>
        <button type="submit" class="btn-primary" [disabled]="form.invalid || saving || estadoReserva !== 'PEN'" *ngIf="estadoReserva === 'PEN'">
          <span *ngIf="!saving">{{ isEditing ? 'Actualizar' : 'Crear' }}</span>
          <span *ngIf="saving">Guardando...</span>
        </button>
      </div>
    </form>
  </div>
</div>

<div class="toast" [ngClass]="toast.type" *ngIf="toast.visible">
  {{ toast.message }}
</div>
