<div class="admin-page">
  <div class="page-header">
    <div class="header-left">
      <a routerLink="/admin/horarios" class="back-link">← Volver a Horarios</a>
      <div class="header-title">
        <span class="header-emoji">🗓️</span>
        <div>
          <h1>{{ isEdit ? 'Actualizar Horario' : 'Crear Horario' }}</h1>
          <p class="header-subtitle">Completa el formulario para {{ isEdit ? 'actualizar el' : 'crear un nuevo' }}
            horario.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" [class.visible]="toast.visible" [class.toast-success]="toast.type === 'success'"
    [class.toast-error]="toast.type === 'error'">
    <span>{{ toast.type === 'success' ? '✅' : '❌' }}</span>
    {{ toast.message }}
  </div>

  <div class="loading-state" *ngIf="loading">
    <div class="spinner"></div>
    <p>Cargando datos...</p>
  </div>

  <div class="form-wrapper" *ngIf="!loading">

    <div class="error-banner" *ngIf="error">
      <span class="error-icon">⚠️</span>
      {{ error }}
    </div>

    <div class="error-banner validation-errors" *ngIf="validationErrors.length > 0">
      <span class="error-icon">⚠️</span>
      <ul>
        <li *ngFor="let err of validationErrors">{{ err }}</li>
      </ul>
    </div>

    <form (ngSubmit)="guardar()" #horarioForm="ngForm" class="admin-form">

      <div class="form-group">
        <label for="atraccionId">Atracción <span class="required">*</span></label>
        <select id="atraccionId" name="atraccionId" [(ngModel)]="payload.atraccionId" required class="form-control">
          <option *ngFor="let a of atracciones" [value]="a.id">{{ a.name }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="fecha">Fecha <span class="required">*</span></label>
        <input type="text" id="fecha" name="fecha" [(ngModel)]="payload.fecha" required placeholder="Ej: 1/1/2027"
          class="form-control" />
      </div>

      <div class="form-group">
        <label for="horaInicio">Hora Inicio <span class="required">*</span></label>
        <input type="text" id="horaInicio" name="horaInicio" [(ngModel)]="payload.horaInicio" required
          placeholder="Ej: 15:00" class="form-control" />
      </div>

      <div class="form-group">
        <label for="horaFin">Hora Fin</label>
        <input type="text" id="horaFin" name="horaFin" [(ngModel)]="payload.horaFin" placeholder="Ej: 16:00 (Opcional)"
          class="form-control" />
      </div>

      <div class="form-group">
        <label for="cupos">Cupos <span class="required">*</span></label>
        <input type="number" id="cupos" name="cupos" [(ngModel)]="payload.cupos" required min="0" placeholder="Ej: 50"
          class="form-control" />
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" routerLink="/admin/horarios" [disabled]="saving">Cancelar</button>
        <button type="submit" class="btn-submit" [disabled]="saving || !horarioForm.form.valid">
          <span *ngIf="!saving">{{ isEdit ? 'Actualizar Horario' : 'Crear Horario' }}</span>
          <span *ngIf="saving">Guardando...</span>
        </button>
      </div>

    </form>
  </div>
</div>
