<div class="admin-page">
  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <a routerLink="/admin/noincluye" class="back-link">← Volver a No Incluidos</a>
      <div class="header-title">
        <span class="header-emoji">❌</span>
        <div>
          <h1>{{ isEdit ? 'Actualizar No Incluido' : 'Crear No Incluido' }}</h1>
          <p class="header-subtitle">Completa el formulario para {{ isEdit ? 'actualizar el' : 'crear un nuevo' }}
            No Incluido.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" [class.visible]="toast.visible" [class.toast-success]="toast.type === 'success'"
    [class.toast-error]="toast.type === 'error'">
    <span>{{ toast.type === 'success' ? '✅' : '❌' }}</span>
    {{ toast.message }}
  </div>

  <!-- Estados de carga -->
  <div class="loading-state" *ngIf="loading">
    <div class="spinner"></div>
    <p>Cargando datos...</p>
  </div>

  <!-- Formulario -->
  <div class="form-wrapper" *ngIf="!loading">

    <div class="error-banner" *ngIf="error">
      <span class="error-icon">⚠️</span>
      {{ error }}
    </div>

    <div class="error-banner validation-errors" *ngIf="validationErrors.length > 0">
      <span class="error-icon">⚠️</span>
      <ul>
        <li *ngFor="let err of validationErrors">{{ err }}</li>
      </ul>
    </div>

    <form (ngSubmit)="guardar()" #incluyeForm="ngForm" class="admin-form">

      <div class="form-group">
        <label for="descripcion">Descripción <span class="required">*</span></label>
        <input type="text" id="descripcion" name="descripcion" [(ngModel)]="payload.descripcion" required
          placeholder="Ej: No incluye entrada y transporte" class="form-control" />
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" routerLink="/admin/noincluye" [disabled]="saving">Cancelar</button>
        <button type="submit" class="btn-submit" [disabled]="saving">
          <span *ngIf="!saving">{{ isEdit ? 'Actualizar No Incluido' : 'Crear No Incluido' }}</span>
          <span *ngIf="saving">Guardando...</span>
        </button>
      </div>

    </form>
  </div>
</div>
