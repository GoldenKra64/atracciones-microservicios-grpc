<div class="admin-login-page">
  <div class="bg-grid"></div>
  <div class="bg-orb"></div>

  <div class="login-card">
    <div class="card-header">
      <div class="admin-badge">ADMIN</div>
      <h1 class="card-title"><span class="gold">A</span>TRAXIA</h1>
      <p class="card-subtitle">Panel de Administración</p>
    </div>

    <div class="divider"></div>

    <div class="error-msg" *ngIf="error">
      <span class="error-icon">⚠️</span>
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="field">
        <label for="login">Usuario</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input
            id="login"
            type="text"
            [(ngModel)]="credentials.login"
            name="login"
            placeholder="Nombre de usuario"
            autocomplete="username"
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="credentials.password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <button type="submit" class="btn-ingresar" [disabled]="loading" [class.loading]="loading">
        <span *ngIf="!loading">Ingresar al panel</span>
        <span *ngIf="loading" class="btn-loading">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </span>
      </button>
    </form>

    <div class="card-footer">
      <a href="/" class="back-link">← Volver al sitio</a>
    </div>
  </div>
</div>
